<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mnemosyne — Options</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: system-ui, sans-serif;
        background: #0b0e13;
        color: #e6eaf0;
        margin: 0;
        padding: 28px;
        max-width: 460px;
      }
      h1 { font-size: 18px; margin: 0 0 4px; }
      p { color: #8b95a5; font-size: 13px; margin: 0 0 20px; }
      label { display: block; font-size: 12px; color: #b6bdc9; margin: 14px 0 6px; }
      input {
        width: 100%; box-sizing: border-box; padding: 9px 11px; border-radius: 8px;
        border: 1px solid #2a2f3a; background: #11151c; color: #e6eaf0; font-size: 13px;
      }
      button {
        margin-top: 18px; padding: 9px 16px; border: 0; border-radius: 8px;
        background: #34d399; color: #06231a; font-weight: 600; font-size: 13px; cursor: pointer;
      }
      #status { margin-left: 10px; color: #34d399; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>Mnemosyne</h1>
    <p>Paste a write-scoped API key (create one in Settings → Agents).</p>
    <form id="form">
      <label for="apiBase">API base URL</label>
      <input id="apiBase" type="url" placeholder="http://localhost:3000" />
      <label for="apiKey">API key</label>
      <input id="apiKey" type="password" placeholder="mnem_…" />
      <div>
        <button type="submit">Save</button>
        <span id="status"></span>
      </div>
    </form>
    <script type="module" src="dist/options.js"></script>
  </body>
</html>
