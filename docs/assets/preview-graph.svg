<svg width="1240" height="760" viewBox="0 0 1240 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <radialGradient id="aura" cx="50%" cy="46%" r="60%">
      <stop offset="0" stop-color="#DDEBEC"/>
      <stop offset="100%" stop-color="#F3F7F7"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#264A4C" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86A6A8"/><stop offset="0.55" stop-color="#4E6E70"/><stop offset="1" stop-color="#2F4B4E"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="1224" height="744" rx="20" fill="url(#aura)" stroke="#D1E0E1"/>
  <!-- top bar -->
  <g>
    <circle cx="44" cy="44" r="6" fill="#E0B0A6"/><circle cx="66" cy="44" r="6" fill="#E6D2A0"/><circle cx="88" cy="44" r="6" fill="#A9C8B0"/>
    <rect x="150" y="30" width="24" height="24" rx="7" fill="url(#mark)"/>
    <path d="M157 49 V36 L162 44 L167 36 V49" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="188" y="49" font-size="14" font-weight="600" letter-spacing="3" fill="#122224">MNEMO</text>
    <rect x="470" y="30" width="300" height="26" rx="13" fill="#fff" stroke="#D1E0E1"/>
    <text x="492" y="47" font-size="12.5" fill="#7C9698">Search your mind…</text>
    <!-- Themes | Graph toggle -->
    <rect x="1010" y="29" width="180" height="28" rx="9" fill="#E6EEEF"/>
    <rect x="1102" y="32" width="85" height="22" rx="7" fill="#fff" stroke="#D1E0E1"/>
    <text x="1038" y="47" font-size="12.5" fill="#5C7779">Themes</text>
    <text x="1118" y="47" font-size="12.5" font-weight="600" fill="#23383A">Graph</text>
  </g>
  <line x1="20" y1="74" x2="1220" y2="74" stroke="#E1EBEC"/>

  <!-- ── graph canvas ── edges first ── -->
  <g stroke="#9BB6B8" stroke-opacity="0.55" stroke-width="1.6">
    <line x1="620" y1="430" x2="380" y2="300"/>
    <line x1="620" y1="430" x2="830" y2="270"/>
    <line x1="620" y1="430" x2="300" y2="500"/>
    <line x1="620" y1="430" x2="470" y2="620"/>
    <line x1="620" y1="430" x2="890" y2="540"/>
    <line x1="620" y1="430" x2="650" y2="210"/>
    <line x1="620" y1="430" x2="980" y2="400"/>
    <line x1="620" y1="430" x2="760" y2="650"/>
    <line x1="380" y1="300" x2="300" y2="500"/>
    <line x1="300" y1="500" x2="200" y2="380"/>
    <line x1="380" y1="300" x2="470" y2="620"/>
    <line x1="650" y1="210" x2="430" y2="210"/>
    <line x1="890" y1="540" x2="760" y2="650"/>
    <line x1="830" y1="270" x2="980" y2="400"/>
  </g>

  <!-- self hub -->
  <g filter="url(#soft)">
    <circle cx="620" cy="430" r="30" fill="#3E5A5D"/>
    <path d="M609 444 V417 L620 431 L631 417 V444" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="620" y="492" font-size="12.5" font-weight="600" fill="#23383A" text-anchor="middle">you</text>

  <!-- node helper renders: dot + label pill -->
  <!-- interest -->
  <g><circle cx="380" cy="300" r="8" fill="#7D9BB0"/><g filter="url(#soft)"><rect x="220" y="287" width="150" height="26" rx="13" fill="#fff"/></g><text x="295" y="304" font-size="12.5" fill="#23383A" text-anchor="middle">Cognitive science</text></g>
  <g><circle cx="890" cy="540" r="8" fill="#7D9BB0"/><g filter="url(#soft)"><rect x="900" y="527" width="128" height="26" rx="13" fill="#fff"/></g><text x="964" y="544" font-size="12.5" fill="#23383A" text-anchor="middle">Stoic philosophy</text></g>
  <!-- goal -->
  <g><circle cx="830" cy="270" r="8" fill="#A6896A"/><g filter="url(#soft)"><rect x="842" y="257" width="188" height="26" rx="13" fill="#fff"/></g><text x="936" y="274" font-size="12.5" fill="#23383A" text-anchor="middle">Write a book on attention</text></g>
  <g><circle cx="980" cy="400" r="8" fill="#A6896A"/><g filter="url(#soft)"><rect x="992" y="387" width="210" height="26" rx="13" fill="#fff"/></g><text x="1097" y="404" font-size="12.5" fill="#23383A" text-anchor="middle">Build a tool that thinks with me</text></g>
  <!-- belief -->
  <g><circle cx="650" cy="210" r="8" fill="#6E8F86"/><g filter="url(#soft)"><rect x="540" y="173" width="220" height="26" rx="13" fill="#fff"/></g><text x="650" y="190" font-size="12.5" fill="#23383A" text-anchor="middle">Writing is thinking made visible</text></g>
  <g><circle cx="430" cy="210" r="8" fill="#6E8F86"/><g filter="url(#soft)"><rect x="300" y="173" width="200" height="26" rx="13" fill="#fff"/></g><text x="400" y="190" font-size="12.5" fill="#23383A" text-anchor="middle">Constraints breed creativity</text></g>
  <!-- book -->
  <g><circle cx="300" cy="500" r="8" fill="#8E84A8"/><g filter="url(#soft)"><rect x="150" y="487" width="178" height="26" rx="13" fill="#fff"/></g><text x="239" y="504" font-size="12.5" fill="#23383A" text-anchor="middle">Thinking, Fast and Slow</text></g>
  <!-- person -->
  <g><circle cx="200" cy="380" r="8" fill="#B08A94"/><g filter="url(#soft)"><rect x="120" y="367" width="150" height="26" rx="13" fill="#fff"/></g><text x="195" y="384" font-size="12.5" fill="#23383A" text-anchor="middle">Daniel Kahneman</text></g>
  <!-- concept -->
  <g><circle cx="470" cy="620" r="8" fill="#9BB6B8"/><g filter="url(#soft)"><rect x="345" y="607" width="150" height="26" rx="13" fill="#fff"/></g><text x="420" y="624" font-size="12.5" fill="#23383A" text-anchor="middle">System 1 / System 2</text></g>
  <g><circle cx="760" cy="650" r="8" fill="#9BB6B8"/><g filter="url(#soft)"><rect x="770" y="637" width="92" height="26" rx="13" fill="#fff"/></g><text x="816" y="654" font-size="12.5" fill="#23383A" text-anchor="middle">Flow state</text></g>

  <!-- legend -->
  <g font-size="11.5" fill="#5C7779">
    <circle cx="40" cy="712" r="5" fill="#6E8F86"/><text x="52" y="716">belief</text>
    <circle cx="110" cy="712" r="5" fill="#A6896A"/><text x="122" y="716">goal</text>
    <circle cx="172" cy="712" r="5" fill="#7D9BB0"/><text x="184" y="716">interest</text>
    <circle cx="246" cy="712" r="5" fill="#9BB6B8"/><text x="258" y="716">concept</text>
    <circle cx="330" cy="712" r="5" fill="#8E84A8"/><text x="342" y="716">source</text>
    <circle cx="406" cy="712" r="5" fill="#B08A94"/><text x="418" y="716">person</text>
  </g>
</svg>
