<svg width="1240" height="560" viewBox="0 0 1240 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <radialGradient id="aura2" cx="50%" cy="30%" r="75%">
      <stop offset="0" stop-color="#E7F0F1"/><stop offset="100%" stop-color="#F3F7F7"/>
    </radialGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#264A4C" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="mark2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86A6A8"/><stop offset="0.55" stop-color="#4E6E70"/><stop offset="1" stop-color="#2F4B4E"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="1224" height="544" rx="20" fill="url(#aura2)" stroke="#D1E0E1"/>
  <!-- top bar -->
  <circle cx="44" cy="44" r="6" fill="#E0B0A6"/><circle cx="66" cy="44" r="6" fill="#E6D2A0"/><circle cx="88" cy="44" r="6" fill="#A9C8B0"/>
  <rect x="150" y="30" width="24" height="24" rx="7" fill="url(#mark2)"/>
  <path d="M157 49 V36 L162 44 L167 36 V49" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="188" y="49" font-size="14" font-weight="600" letter-spacing="3" fill="#122224">MNEMO</text>
  <text x="1130" y="48" font-size="12.5" fill="#5C7779" text-anchor="end">Ask · your companion</text>
  <line x1="20" y1="74" x2="1220" y2="74" stroke="#E1EBEC"/>

  <!-- user bubble (right) -->
  <g filter="url(#soft2)"><rect x="612" y="110" width="528" height="44" rx="16" fill="#3E5A5D"/></g>
  <text x="636" y="137" font-size="14.5" fill="#F3F7F7">What do I actually believe about productivity?</text>

  <!-- MNEMO avatar + answer bubble (left) -->
  <rect x="40" y="196" width="34" height="34" rx="10" fill="url(#mark2)"/>
  <path d="M50 223 V204 L57 214 L64 204 V223" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <g filter="url(#soft2)"><rect x="92" y="190" width="700" height="150" rx="16" fill="#fff"/></g>
  <text font-size="14.5" fill="#23383A">
    <tspan x="116" y="224">You're sceptical of it. You believe </tspan><tspan font-weight="600" fill="#122224">most productivity</tspan>
    <tspan x="116" y="250" font-weight="600" fill="#122224">advice is procrastination in disguise</tspan><tspan fill="#23383A"> — your real</tspan>
    <tspan x="116" y="276">lever is </tspan><tspan font-style="italic">writing to think</tspan><tspan> and that </tspan><tspan font-weight="600" fill="#122224">constraints</tspan>
    <tspan x="116" y="302" font-weight="600" fill="#122224">breed creativity</tspan><tspan fill="#23383A"> more than systems do.</tspan>
  </text>
  <!-- citation chips -->
  <g font-size="11.5">
    <rect x="116" y="316" width="232" height="22" rx="11" fill="#EAF1F1" stroke="#D7E5E6"/>
    <circle cx="130" cy="327" r="4" fill="#6E8F86"/><text x="142" y="331" fill="#3E5A5D">belief · most productivity advice…</text>
    <rect x="360" y="316" width="208" height="22" rx="11" fill="#EAF1F1" stroke="#D7E5E6"/>
    <circle cx="374" cy="327" r="4" fill="#6E8F86"/><text x="386" y="331" fill="#3E5A5D">belief · constraints breed creativity</text>
  </g>
  <text x="116" y="372" font-size="11.5" fill="#7C9698">grounded in your own beliefs · owner-asserted outranks inferred</text>

  <!-- composer -->
  <g filter="url(#soft2)"><rect x="92" y="452" width="1056" height="48" rx="14" fill="#fff" stroke="#E1EBEC"/></g>
  <text x="116" y="481" font-size="14" fill="#9BB0B1">Ask your mind anything…</text>
  <circle cx="1064" cy="476" r="16" fill="#EAF1F1"/>
  <path d="M1064 469 v9 M1059 474 a5 6 0 0 0 10 0 M1064 484 v3" stroke="#5C7779" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <circle cx="1112" cy="476" r="17" fill="#3E5A5D"/>
  <path d="M1105 476 h13 M1112 470 l6 6 -6 6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
